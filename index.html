<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Proptonomy · KPI-tavle</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  :root{
    --bg:#f3f4fa; --card:#ffffff; --line:#e9ebf3; --txt:#20233f; --muted:#8b90a8;
    --accent:#6c5ce7; --accent-soft:#efedfd;
    --green-bg:#e6f7ee; --green:#149e5a; --yellow-bg:#fbf3d5; --yellow:#b58105;
    --blue-bg:#e3f0fd; --blue:#1b6fc4;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--txt);}
  .wrap{max-width:1140px;margin:0 auto;padding:20px 20px 60px}
  .sec{font-size:20px;font-weight:800;margin:0 0 2px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 14px}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:24px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
  .brand .logo{width:30px;height:30px;border-radius:9px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:800}
  .brand em{color:var(--muted);font-style:normal;font-weight:600;font-size:14px}
  .navwrap{display:flex;align-items:center;gap:10px}
  .navi{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:5px 8px;font-size:13px;font-weight:700}
  .navi button{border:0;background:transparent;cursor:pointer;font-size:17px;color:var(--muted);padding:0 4px;line-height:1}
  .navi button:hover{color:var(--accent)}
  .seg{display:flex;gap:2px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:4px}
  .seg button{border:0;background:transparent;padding:6px 14px;border-radius:7px;font-weight:600;font-size:13px;color:var(--muted);cursor:pointer}
  .seg button.active{background:var(--accent-soft);color:var(--accent)}
  .userchip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:5px 12px 5px 6px;font-weight:600;font-size:14px;cursor:pointer}

  .ava{flex:none;width:28px;height:28px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800}

  .statsrow{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:32px;align-items:stretch}
  .stat{flex:1 1 130px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(30,30,60,.04)}
  .stat.mine{background:#f4f2fe;border-color:#ddd6fb}
  .stat-ic{width:34px;height:34px;border-radius:9px;background:#f3f2fd;display:grid;place-items:center;font-size:18px;margin-bottom:10px}
  .stat-num{font-size:28px;font-weight:800;line-height:1}
  .stat-lbl{font-weight:700;font-size:14px;margin-top:8px}
  .stat-sub{color:var(--muted);font-size:12px;margin-top:3px}
  .mincard{flex:2 1 210px;background:linear-gradient(150deg,#7d70f2,#6153e0);color:#fff;border:0;min-height:150px;display:flex;flex-direction:column}
  .min-top{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;letter-spacing:.5px;opacity:.92}
  .rankbadge{background:rgba(255,255,255,.22);padding:2px 9px;border-radius:999px;font-size:11px;letter-spacing:0}
  .min-num{font-size:46px;font-weight:800;line-height:1;margin-top:10px}
  .min-lbl{font-size:13px;opacity:.85;margin:4px 0 auto}
  .min-bar{height:7px;background:rgba(255,255,255,.25);border-radius:999px;overflow:hidden;margin:12px 0 8px}
  .min-bar i{display:block;height:100%;background:#fff;border-radius:999px;transition:width .5s}
  .min-foot{font-size:12px;opacity:.92}
  .mincard.clickable{cursor:pointer;justify-content:center;text-align:center}

  .loggrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
  @media(max-width:900px){.loggrid{grid-template-columns:1fr}}
  .loggroup{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(30,30,60,.04)}
  .lg-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .lg-ic{width:32px;height:32px;border-radius:9px;background:#f3f2fd;display:grid;place-items:center;font-size:16px}
  .lg-title{font-weight:700;font-size:15px}
  .lg-note{font-size:12px;color:var(--muted)}
  .lg-row{display:flex;align-items:center;gap:11px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.12s}
  .lg-row:last-child{margin-bottom:0}
  .lg-row:hover{border-color:var(--accent);background:#faf9ff}
  .lg-row:active{transform:scale(.99)}
  .lg-emoji{font-size:18px}
  .lg-name{font-weight:600;flex:1}
  .pill{font-size:12px;font-weight:700;padding:3px 9px;border-radius:999px}
  .pill.green{background:var(--green-bg);color:var(--green)}
  .pill.yellow{background:var(--yellow-bg);color:var(--yellow)}
  .pill.blue{background:var(--blue-bg);color:var(--blue)}
  .plus{width:26px;height:26px;border-radius:7px;background:#f1f1f8;display:grid;place-items:center;color:var(--muted);font-weight:700;font-size:16px;border:0;cursor:pointer;line-height:1;padding:0}
  .lg-row:hover .plus{background:var(--accent);color:#fff}
  .minus{width:26px;height:26px;border-radius:7px;background:#f1f1f8;display:grid;place-items:center;color:var(--muted);font-weight:700;font-size:18px;border:0;cursor:pointer;line-height:1;padding:0}
  .minus:hover{background:#e74c3c;color:#fff}

  .lbgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:900px){.lbgrid{grid-template-columns:1fr}}
  .lb-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(30,30,60,.04)}
  .lb-head{font-weight:700;font-size:15px;margin-bottom:10px}
  .lb-row{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px}
  .lb-row.me{background:var(--accent-soft)}
  .lb-rank{width:22px;text-align:center;font-size:13px;font-weight:700;color:var(--muted)}
  .lb-mid{flex:1;min-width:0}
  .lb-name{font-weight:600;font-size:14px;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-bar{height:6px;background:#eef0f6;border-radius:999px;overflow:hidden}
  .lb-bar i{display:block;height:100%;background:linear-gradient(90deg,#6c5ce7,#8a7bf0);border-radius:999px;transition:width .5s}
  .lb-val{font-weight:800;font-size:15px;min-width:42px;text-align:right}
  .lb-val small{color:var(--muted);font-weight:600;font-size:11px}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(80px);
    background:var(--accent);color:#fff;padding:13px 22px;border-radius:999px;font-weight:700;
    box-shadow:0 12px 30px rgba(108,92,231,.35);opacity:0;transition:.3s;z-index:50;display:flex;align-items:center;gap:14px}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast-btn{background:rgba(255,255,255,.25);border:0;color:#fff;font-weight:700;padding:5px 13px;border-radius:999px;cursor:pointer;font-size:13px;white-space:nowrap}
  .toast-btn:hover{background:rgba(255,255,255,.42)}
  .flash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:55;opacity:0}
  .flash.show{animation:pop 1.4s ease}
  .flash span{font-size:60px;font-weight:900;color:var(--accent);text-shadow:0 6px 26px rgba(108,92,231,.4)}
  @keyframes pop{0%{opacity:0;transform:scale(.6)}20%{opacity:1;transform:scale(1.1)}70%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1)}}

  .picker{position:fixed;inset:0;background:rgba(25,25,50,.4);display:flex;align-items:center;justify-content:center;z-index:60}
  .picker .box{background:#fff;border-radius:18px;padding:24px;width:330px;box-shadow:0 24px 70px rgba(0,0,0,.25)}
  .picker h3{margin:0 0 4px;text-align:center}
  .picker p{color:var(--muted);font-size:13px;margin:0 0 16px;text-align:center}
  .picker .opt{display:flex;align-items:center;gap:11px;width:100%;padding:11px 14px;margin:8px 0;border-radius:11px;border:1px solid var(--line);background:#fff;font-size:15px;font-weight:600;cursor:pointer;text-align:left;color:var(--txt)}
  .picker .opt:hover{border-color:var(--accent);background:#faf9ff}
  .amount-input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:11px;font-size:18px;font-weight:700;text-align:center;color:var(--txt)}
  .amount-input:focus{outline:none;border-color:var(--accent)}
  .btnrow{display:flex;gap:8px;margin-top:14px}
  .btn-ghost{flex:1;padding:11px;border-radius:11px;border:1px solid var(--line);background:#fff;font-weight:600;cursor:pointer;color:var(--muted)}
  .btn-primary{flex:1;padding:11px;border-radius:11px;border:0;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}

  .banner{background:#fff4d6;border:1px solid #f0dca0;color:#8a6d1a;padding:12px 14px;border-radius:12px;margin-bottom:16px;font-size:14px}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="logo">P</span> Proptonomy <em>KPI-tavle</em></div>
    <div class="navwrap">
      <div class="navi"><button onclick="shiftOffset(-1)">‹</button><span id="periodLabel">…</span><button onclick="shiftOffset(1)">›</button></div>
      <div class="seg"><button id="segWeek" onclick="setPeriod('week')">Uke</button><button id="segMonth" onclick="setPeriod('month')">Måned</button></div>
    </div>
    <div class="userchip" id="whoBtn" onclick="openPicker()">Velg navn</div>
  </div>

  <div id="setupBanner" class="banner hidden"></div>

  <div class="statsrow" id="statsRow"></div>

  <h1 class="sec" id="mineHeading">Min statistikk</h1>
  <p class="sub" id="mineSub">Dine egne tall</p>
  <div class="statsrow" id="mineRow"></div>

  <h1 class="sec">Logg aktivitet</h1>
  <p class="sub">Trykk for å registrere — tavla oppdateres live</p>
  <div class="loggrid" id="logGrid"></div>

  <h1 class="sec">Leaderboards</h1>
  <p class="sub" id="lbSub">Ett per KPI</p>
  <div class="lbgrid" id="lbGrid"></div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span><button id="toastAction" class="toast-btn" style="display:none">Angre</button></div>
<div class="flash" id="flash"><span id="flashText"></span></div>

<!-- Hvem er du -->
<div class="picker hidden" id="picker">
  <div class="box">
    <h3>Hvem er du?</h3>
    <p>Velg navnet ditt for å logge aktivitet.</p>
    <div id="pickerButtons"></div>
  </div>
</div>

<!-- Tallinntasting (tokens) -->
<div class="picker hidden" id="amountModal">
  <div class="box">
    <h3 id="amountTitle">Tokens</h3>
    <p>Skriv inn antall</p>
    <input id="amountInput" class="amount-input" type="number" min="1" inputmode="numeric" placeholder="f.eks. 5000"
           onkeydown="if(event.key==='Enter')confirmAmount();if(event.key==='Escape')closeAmount()" />
    <div class="btnrow">
      <button class="btn-ghost" onclick="closeAmount()">Avbryt</button>
      <button class="btn-primary" onclick="confirmAmount()">Logg</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   KONFIGURASJON
   ============================================================ */
const CONFIG = {
  SUPABASE_URL:      "https://nmyyjyrfnnvfcnecybva.supabase.co",
  SUPABASE_ANON_KEY: "sb_publishable_CPiomPa5pZEufbb7OKLPZQ_zmPCvnyt",

  TEAM: ["Henrik", "Erik", "Mathias", "Fredrik", "Njål", "Mathias H"],

  // cat: "kpi" (poeng) | "fun" (Kolakonge) | "meta" (egen tavle, ikke poeng)
  // board:true  -> eget statuskort + eget leaderboard
  // amount:true -> skriv inn et tall når du logger (lagres i points-kolonnen)
  ACTIVITIES: [
    { label:"Salg",                   points:10, emoji:"💰", cat:"kpi", group:"Salg & vekst",         board:true, short:"Confirmed salg", unit:"salg" },
    { label:"Booket demo",            points:5, emoji:"📅", cat:"kpi", group:"Salg & vekst",         board:true, short:"Demoer booket",  unit:"demo" },
    { label:"Sendt tilbud",           points:1, emoji:"📄", cat:"kpi", group:"Salg & vekst" },
    { label:"Kald outreach",          points:1, emoji:"📞", cat:"kpi", group:"Salg & vekst",         board:true, short:"Cold calls",     unit:"kall" },
    { label:"Fullført oppgave",       points:1, emoji:"✅", cat:"kpi", group:"Jobb & produktivitet" },
    { label:"Kundemøte",              points:2, emoji:"🤝", cat:"kpi", group:"Jobb & produktivitet" },    { label:"Publisert innhold",      points:2, emoji:"✍️", cat:"kpi", group:"Jobb & produktivitet" },
    { label:"Markedsføringskampanje", points:3, emoji:"📣", cat:"kpi", group:"Jobb & produktivitet", board:true, short:"Kampanjer",      unit:"kampanje" },
    { label:"Fritz-Kola",             points:0, emoji:"🍺", cat:"fun", group:"Kultur & gøy" },
    { label:"Bionade",                points:0, emoji:"🍋", cat:"fun", group:"Kultur & gøy" },
    { label:"Tokens consumed",        points:0, emoji:"🪙", cat:"meta", group:"Jobb & produktivitet",        board:true, short:"Tokens consumed", amount:true },
  ],

  GROUPS: [
    { name:"Salg & vekst",         icon:"💼", note:"poeng" },
    { name:"Jobb & produktivitet", icon:"⚙️", note:"poeng" },
    { name:"Kultur & gøy",         icon:"🎉", note:"0 poeng — egen «Kolakonge»-tavle" },
  ],

  COLORS: ["#6c5ce7", "#e8563f", "#2fb673", "#3f7fe8", "#f0932b", "#e056a0"],

  // Tokens: hvor mange tokens som gir 1 poeng
  TOKENS_PER_POINT: 30000000,
};
/* ============================================================ */

const PERIODS = { week:{short:"Uke"}, month:{short:"Måned"} };
let period = "week";
let offset = 0;

let sb = null;
const configured = CONFIG.SUPABASE_URL.startsWith("http") && CONFIG.SUPABASE_ANON_KEY.length > 20;
if (configured) sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

const findAct = (l) => CONFIG.ACTIVITIES.find(a => a.label === l);
const ptsOf   = (l) => (findAct(l)?.points ?? 0);
const emojiOf = (l) => (findAct(l)?.emoji ?? "•");
const catOf   = (l) => (findAct(l)?.cat ?? "kpi");
const colorOf = (n) => CONFIG.COLORS[Math.max(0, CONFIG.TEAM.indexOf(n)) % CONFIG.COLORS.length];
const initials = (n) => { const p = n.trim().split(/\s+/); return (p.length>1 ? p[0][0]+p[1][0] : n.slice(0,2)).toUpperCase(); };
const avatar = (n) => `<span class="ava" style="background:${colorOf(n)}">${initials(n)}</span>`;
const nf = (x) => x.toLocaleString("no-NO");

let me = null; // alltid velg person når siden åpnes

/* ---------- Navn ---------- */
function renderWho(){
  document.getElementById("whoBtn").innerHTML = me ? `${avatar(me)} ${me}` : "Velg navn";
}
function openPicker(){
  const box = document.getElementById("pickerButtons");
  box.innerHTML = "";
  CONFIG.TEAM.forEach(name => {
    const b = document.createElement("button");
    b.className = "opt";
    b.innerHTML = `${avatar(name)} ${name}`;
    b.onclick = () => { me = name;
      document.getElementById("picker").classList.add("hidden"); renderWho(); refresh(); };
    box.appendChild(b);
  });
  document.getElementById("picker").classList.remove("hidden");
}

/* ---------- Logg-kolonner ---------- */
function renderLogGrid(){
  const grid = document.getElementById("logGrid");
  grid.innerHTML = "";
  CONFIG.GROUPS.forEach(g => {
    const acts = CONFIG.ACTIVITIES.filter(a => a.group === g.name);
    const rows = acts.map(a => {
      const pill = a.amount ? `<span class="pill blue">antall</span>`
                 : a.cat === "kpi" ? `<span class="pill green">+${a.points}p</span>`
                 : `<span class="pill yellow">gøy</span>`;
      return `<div class="lg-row" data-label="${a.label}">
        <span class="lg-emoji">${a.emoji}</span>
        <span class="lg-name">${a.label}</span>${pill}
        <button class="minus" data-label="${a.label}" title="Fjern siste">−</button>
        <span class="plus">+</span>
      </div>`;
    }).join("");
    grid.insertAdjacentHTML("beforeend", `
      <div class="loggroup">
        <div class="lg-head"><span class="lg-ic">${g.icon}</span>
          <div><div class="lg-title">${g.name}</div><div class="lg-note">${g.note}</div></div>
        </div>
        ${rows}
      </div>`);
  });
  grid.querySelectorAll(".lg-row").forEach(el => el.onclick = () => logActivity(el.dataset.label));
  grid.querySelectorAll(".minus").forEach(b => b.onclick = (e) => { e.stopPropagation(); removeActivity(b.dataset.label); });
}

async function logActivity(label){
  if (!me) return openPicker();
  if (!configured) return toast("⚠️ Supabase ikke satt opp ennå", { err: true });
  if (findAct(label)?.amount) return openAmount(label);
  await insertRow(label, ptsOf(label));
}
async function insertRow(label, points, msg){
  const { data, error } = await sb.from("activities").insert({ person: me, activity: label, points }).select("id").single();
  if (error) return toast("Feil: " + error.message, { err: true });
  if (label === "Salg") celebrate();
  toast(msg || `${emojiOf(label)} ${label} logget`, { action: (data && data.id) ? () => undoRow(data.id) : null });
  refresh();
}

/* ---------- Tallinntasting ---------- */
let pendingLabel = null;
function openAmount(label){
  pendingLabel = label;
  document.getElementById("amountTitle").textContent = `${emojiOf(label)} ${label}`;
  const inp = document.getElementById("amountInput"); inp.value = "";
  document.getElementById("amountModal").classList.remove("hidden");
  setTimeout(() => inp.focus(), 50);
}
function closeAmount(){ document.getElementById("amountModal").classList.add("hidden"); pendingLabel = null; }
async function confirmAmount(){
  const v = parseInt(document.getElementById("amountInput").value, 10);
  if (!v || v <= 0) return toast("Skriv inn et gyldig antall", { err: true });
  const label = pendingLabel; closeAmount();
  await insertRow(label, v, `🪙 ${nf(v)} tokens logget`);
}

/* ---------- Feiring ---------- */
let toastT, flashT;
function toast(msg, opts){
  opts = opts || {};
  const t = document.getElementById("toast");
  document.getElementById("toastMsg").textContent = msg;
  const btn = document.getElementById("toastAction");
  if (opts.action){
    btn.style.display = "";
    btn.textContent = opts.actionText || "Angre";
    btn.onclick = () => { t.classList.remove("show"); clearTimeout(toastT); opts.action(); };
  } else {
    btn.style.display = "none";
  }
  t.style.background = opts.err ? "#e74c3c" : "var(--accent)";
  t.classList.add("show");
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove("show"), opts.action ? 6000 : 2600);
}
async function undoRow(id){
  if (!id || !configured) return;
  const { error } = await sb.from("activities").delete().eq("id", id);
  if (error) return toast("Kunne ikke angre: " + error.message, { err: true });
  toast("↩️ Fjernet igjen");
  refresh();
}
// Minus-knappen: fjern brukerens SISTE registrering av en aktivitet, med Angre (gjenopprett).
async function removeActivity(label){
  if (!me) return openPicker();
  if (!configured) return toast("⚠️ Supabase ikke satt opp ennå", { err: true });
  const { data, error } = await sb.from("activities").select("id,points")
    .eq("person", me).eq("activity", label).order("created_at", { ascending: false }).limit(1);
  if (error) return toast("Feil: " + error.message, { err: true });
  if (!data || !data.length) return toast(`Ingen «${label}» å fjerne for ${me}`, { err: true });
  const row = data[0];
  const del = await sb.from("activities").delete().eq("id", row.id);
  if (del.error) return toast("Kunne ikke fjerne: " + del.error.message, { err: true });
  toast(`➖ ${label} fjernet`, { action: () => insertRow(label, row.points, `${emojiOf(label)} ${label} gjenopprettet`) });
  refresh();
}
function celebrate(){
  const f = document.getElementById("flash");
  document.getElementById("flashText").textContent = "🎉 SALG! 💰";
  f.classList.remove("show"); void f.offsetWidth; f.classList.add("show");
  clearTimeout(flashT); flashT = setTimeout(() => f.classList.remove("show"), 1400);
  if (window.confetti){
    const end = Date.now() + 900;
    (function frame(){
      confetti({ particleCount: 7, angle: 60,  spread: 60, origin: { x: 0 } });
      confetti({ particleCount: 7, angle: 120, spread: 60, origin: { x: 1 } });
      if (Date.now() < end) requestAnimationFrame(frame);
    })();
    confetti({ particleCount: 130, spread: 95, origin: { y: 0.6 } });
  }
}

/* ---------- Periode ---------- */
function isoWeek(d){
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (date.getUTCDay() + 6) % 7;
  date.setUTCDate(date.getUTCDate() - dayNum + 3);
  const firstThu = new Date(Date.UTC(date.getUTCFullYear(), 0, 4));
  return 1 + Math.round(((date - firstThu) / 86400000 - 3 + ((firstThu.getUTCDay() + 6) % 7)) / 7);
}
function periodRange(){
  const now = new Date();
  if (period === "week"){
    const day = (now.getDay() + 6) % 7;
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - day + offset * 7);
    const end = new Date(start); end.setDate(start.getDate() + 7);
    const last = new Date(end); last.setDate(end.getDate() - 1);
    const fmt = d => d.toLocaleDateString("no-NO", { day:"numeric", month:"short" });
    return { start, end, label:`Uke ${isoWeek(start)} · ${fmt(start)} – ${fmt(last)}` };
  }
  const start = new Date(now.getFullYear(), now.getMonth() + offset, 1);
  const end = new Date(now.getFullYear(), now.getMonth() + offset + 1, 1);
  let label = start.toLocaleDateString("no-NO", { month:"long", year:"numeric" });
  return { start, end, label: label.charAt(0).toUpperCase() + label.slice(1) };
}
function setPeriod(p){ period = p; offset = 0; renderNav(); refresh(); }
function shiftOffset(d){ offset = Math.min(0, offset + d); renderNav(); refresh(); }
function renderNav(){
  document.getElementById("periodLabel").textContent = periodRange().label;
  document.getElementById("segWeek").classList.toggle("active", period === "week");
  document.getElementById("segMonth").classList.toggle("active", period === "month");
  document.getElementById("lbSub").textContent = "Ett per KPI · " + (period === "week" ? "uke" : "måned");
}

/* ---------- Data ---------- */
async function fetchRows(){
  if (!configured) return [];
  const { start, end } = periodRange();
  const { data, error } = await sb.from("activities").select("*")
    .gte("created_at", start.toISOString()).lt("created_at", end.toISOString())
    .order("created_at", { ascending: false });
  if (error){ toast("Feil ved henting: " + error.message, { err: true }); return []; }
  return data || [];
}

function pointsMap(kpiRows){
  const m = {}; CONFIG.TEAM.forEach(n => m[n] = 0);
  kpiRows.forEach(r => { if (m[r.person] === undefined) m[r.person] = 0; m[r.person] += (r.points || 0); });
  return m;
}
// Totalpoeng = KPI-poeng + tokens-poeng (1 poeng per TOKENS_PER_POINT tokens)
function totalPointsMap(kpiRows, tokenRows){
  const m = pointsMap(kpiRows);
  const tk = {}; CONFIG.TEAM.forEach(n => tk[n] = 0);
  tokenRows.forEach(r => { if (tk[r.person] === undefined) tk[r.person] = 0; tk[r.person] += (r.points || 0); });
  CONFIG.TEAM.forEach(n => { m[n] = (m[n] || 0) + Math.floor((tk[n] || 0) / CONFIG.TOKENS_PER_POINT); });
  return m;
}
function sumMap(rows, label){ // summerer points (mengde) per person for én aktivitet
  const m = {}; CONFIG.TEAM.forEach(n => m[n] = 0);
  rows.filter(r => r.activity === label).forEach(r => { if (m[r.person] === undefined) m[r.person] = 0; m[r.person] += (r.points || 0); });
  return m;
}
function countMap(rows, label){
  const m = {}; CONFIG.TEAM.forEach(n => m[n] = 0);
  rows.filter(r => r.activity === label).forEach(r => { if (m[r.person] === undefined) m[r.person] = 0; m[r.person] += 1; });
  return m;
}

/* ---------- Statuskort ---------- */
function renderStats(kpiRows, funRows, tokenRows){
  let html = "";
  if (me){
    const pm = totalPointsMap(kpiRows, tokenRows);
    const ranked = CONFIG.TEAM.map(n => ({ n, p: pm[n] || 0 })).sort((a, b) => b.p - a.p);
    const mine = pm[me] || 0;
    const rank = ranked.findIndex(r => r.n === me) + 1;
    const leader = ranked[0];
    const pct = leader.p > 0 ? mine / leader.p * 100 : 0;
    const foot = rank === 1 ? "Du leder! 🎉" : `${leader.p - mine} poeng bak ${leader.n}`;
    const per = period === "week" ? "denne uken" : "denne måneden";
    html += `<div class="stat mincard">
      <div class="min-top">MIN ${period === "week" ? "UKE" : "MÅNED"} <span class="rankbadge">#${rank} av ${CONFIG.TEAM.length}</span></div>
      <div class="min-num">${mine}</div>
      <div class="min-lbl">poeng ${per}</div>
      <div class="min-bar"><i style="width:${pct}%"></i></div>
      <div class="min-foot">${foot}</div>
    </div>`;
  } else {
    html += `<div class="stat mincard clickable" onclick="openPicker()">
      <div class="min-top">MIN UKE</div><div class="min-num">–</div><div class="min-lbl">Velg navnet ditt →</div></div>`;
  }
  CONFIG.ACTIVITIES.filter(a => a.board).forEach(a => {
    let num, sub;
    if (a.amount){
      num = nf(tokenRows.filter(r => r.activity === a.label).reduce((s, r) => s + (r.points || 0), 0));
      sub = `1 poeng per ${nf(CONFIG.TOKENS_PER_POINT)} tokens`;
    } else {
      num = kpiRows.filter(r => r.activity === a.label).length;
      sub = `${a.points} poeng per ${a.unit || "stk"}`;
    }
    html += `<div class="stat">
      <div class="stat-ic">${a.emoji}</div>
      <div class="stat-num">${num}</div>
      <div class="stat-lbl">${a.short || a.label}</div>
      <div class="stat-sub">${sub}</div>
    </div>`;
  });
  html += `<div class="stat">
    <div class="stat-ic">🥤</div>
    <div class="stat-num">${funRows.length}</div>
    <div class="stat-lbl">Kola drukket</div>
    <div class="stat-sub">0 poeng · Kolakonge</div>
  </div>`;
  document.getElementById("statsRow").innerHTML = html;
}

/* ---------- Min statistikk (egne tall) ---------- */
function renderMine(kpiRows, funRows, tokenRows){
  const head = document.getElementById("mineHeading");
  const sub = document.getElementById("mineSub");
  const row = document.getElementById("mineRow");
  if (!me){ head.style.display = "none"; sub.style.display = "none"; row.style.display = "none"; return; }
  head.style.display = ""; sub.style.display = ""; row.style.display = "";
  sub.textContent = `Dine tall (${me}) · ${period === "week" ? "denne uken" : "denne måneden"}`;
  let html = "";
  CONFIG.ACTIVITIES.filter(a => a.board).forEach(a => {
    let num, s;
    if (a.amount){
      num = nf(tokenRows.filter(r => r.person === me && r.activity === a.label).reduce((t, r) => t + (r.points || 0), 0));
      s = "dine tokens";
    } else {
      num = kpiRows.filter(r => r.person === me && r.activity === a.label).length;
      s = "dine";
    }
    html += `<div class="stat mine"><div class="stat-ic">${a.emoji}</div><div class="stat-num">${num}</div><div class="stat-lbl">${a.short || a.label}</div><div class="stat-sub">${s}</div></div>`;
  });
  const kolaMine = funRows.filter(r => r.person === me).length;
  html += `<div class="stat mine"><div class="stat-ic">🥤</div><div class="stat-num">${kolaMine}</div><div class="stat-lbl">Kola drukket</div><div class="stat-sub">dine</div></div>`;
  row.innerHTML = html;
}

/* ---------- Leaderboards ---------- */
function lbCard(title, emoji, valMap, opts){
  opts = opts || {};
  const ranked = CONFIG.TEAM.map(n => ({ n, v: valMap[n] || 0 })).sort((a, b) => b.v - a.v);
  const max = Math.max(1, ...ranked.map(r => r.v));
  const medals = ["🥇","🥈","🥉"];
  const rows = ranked.map((r, i) => `
    <div class="lb-row ${r.n === me ? "me" : ""}">
      <span class="lb-rank">${medals[i] || "#" + (i + 1)}</span>
      ${avatar(r.n)}
      <div class="lb-mid">
        <div class="lb-name" style="${r.n === me ? "color:var(--accent)" : ""}">${r.n}</div>
        <div class="lb-bar"><i style="width:${r.v / max * 100}%;${opts.color ? "background:" + opts.color : ""}"></i></div>
      </div>
      <span class="lb-val">${opts.fmt ? nf(r.v) : r.v}${opts.suffix || ""}</span>
    </div>`).join("");
  return `<div class="lb-card"><div class="lb-head">${emoji} ${title}</div>${rows}</div>`;
}
function renderLeaderboards(kpiRows, funRows, tokenRows){
  let html = "";
  html += lbCard("Total poeng", "🏆", totalPointsMap(kpiRows, tokenRows), { suffix: '<small> p</small>' });
  CONFIG.ACTIVITIES.filter(a => a.board).forEach(a => {
    if (a.amount) html += lbCard(a.short || a.label, a.emoji, sumMap(tokenRows, a.label), { color: "linear-gradient(90deg,#00d1b2,#3fbf9f)", fmt: true });
    else          html += lbCard(a.short || a.label, a.emoji, countMap(kpiRows, a.label));
  });
  const km = {}; CONFIG.TEAM.forEach(n => km[n] = funRows.filter(r => r.person === n).length);
  html += lbCard("Kolakonge", "👑", km, { color: "linear-gradient(90deg,#ffcf5c,#ffb347)" });
  document.getElementById("lbGrid").innerHTML = html;
}

/* ---------- Refresh ---------- */
async function refresh(){
  const rows = await fetchRows();
  const kpiRows   = rows.filter(r => catOf(r.activity) === "kpi");
  const funRows   = rows.filter(r => catOf(r.activity) === "fun");
  const tokenRows = rows.filter(r => catOf(r.activity) === "meta");
  renderStats(kpiRows, funRows, tokenRows);
  renderMine(kpiRows, funRows, tokenRows);
  renderLeaderboards(kpiRows, funRows, tokenRows);
}

/* ---------- Init ---------- */
renderWho();
renderLogGrid();
renderNav();
if (!configured){
  const b = document.getElementById("setupBanner");
  b.classList.remove("hidden");
  b.innerHTML = "⚙️ Nesten klar — lim inn <b>SUPABASE_URL</b> og <b>SUPABASE_ANON_KEY</b> øverst i filen (CONFIG).";
}
openPicker(); // vis alltid personvelgeren ved åpning
if (configured){
  refresh();
  setInterval(refresh, 15000);
  sb.channel("activities-live")
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "activities" }, refresh)
    .subscribe();
} else {
  renderStats([], [], []);
  renderLeaderboards([], [], []);
}
</script>
